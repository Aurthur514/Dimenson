<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Artisan Products</title>
</head>
<body>
    <h1>Handmade Goods</h1>
    <div class="products-list">
        <div class="product-card">
            <a href="https://example.com/product/101" class="product-link">
                <img src="https://example.com/images/ceramic-mug.jpg" alt="Ceramic Mug">
                <h2 class="product-title">Handmade Ceramic Mug</h2>
            </a>
            <div class="product-details">
                <p class="artisan-name">ClayWorks Studio</p>
                <p class="price">$25.00</p>
            </div>
        </div>
        <div class="product-card">
            <a href="https://example.com/product/102" class="product-link">
                <img src="https://example.com/images/soy-candle.jpg" alt="Soy Candle">
                <h2 class="product-title">Organic Soy Candle</h2>
            </a>
            <div class="product-details">
                <p class="artisan-name">Light & Lather</p>
                <p class="price">$18.50</p>
            </div>
        </div>
        <div class="product-card">
            <a href="https://example.com/product/103" class="product-link">
                <img src="https://example.com/images/linocut-print.jpg" alt="Linocut Print">
                <h2 class="product-title">"Forest Spirit" Linocut Print</h2>
            </a>
            <div class="product-details">
                <p class="artisan-name">Ink & Paper</p>
                <p class="price">$45.00</p>
            </div>
        </div>
    </div>
</body>
</html>
